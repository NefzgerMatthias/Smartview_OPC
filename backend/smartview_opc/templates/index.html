<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pneumatik Steuerung Monitor</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #333; padding: 15px; border-radius: 8px; border-left: 5px solid #555; }
        .analog-card { border-left-color: #007bff; }
        .status { display: flex; justify-content: space-between; margin-top: 10px; }
        .led { width: 20px; height: 20px; border-radius: 50%; background: #444; display: inline-block; }
        .led.active { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .bar-container { background: #444; height: 20px; width: 100%; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .bar { background: #007bff; height: 100%; transition: width 0.3s; }
    </style>
</head>
<body>
    <h1>Maschinenstatus (Live)</h1>
    <div class="grid" id="dashboard">Lade Sensordaten...</div>

    <script>
        function update() {
            fetch('/api/tags')
                .then(res => res.json())
                .then(data => {
                    let html = "";
                    for (let id in data) {
                        let item = data[id];
                        if (item.unit) { // Analogwert
                            let percent = (item.value / item.max) * 100;
                            html += `<div class="card analog-card">
                                <h3>${item.name}</h3>
                                <div style="font-size: 2em;">${item.value} ${item.unit}</div>
                                <div class="bar-container"><div class="bar" style="width: ${percent}%"></div></div>
                            </div>`;
                        } else { // Zylinder
                            html += `<div class="card">
                                <h3>${item.name}</h3>
                                <div class="status">
                                    <span>Eingefahren:</span>
                                    <div class="led ${item.eingefahren ? 'active' : ''}"></div>
                                </div>
                                <div class="status">
                                    <span>Ausgefahren:</span>
                                    <div class="led ${item.ausgefahren ? 'active' : ''}"></div>
                                </div>
                            </div>`;
                        }
                    }
                    document.getElementById('dashboard').innerHTML = html;
                });
        }
        setInterval(update, 500); // Alle 0,5 Sek. aktualisieren
    </script>
</body>
</html>
